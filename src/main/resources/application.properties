spring.application.name=javaNE

# Server — use one fixed port; always stop the old app before starting again
server.port=8085

# Database — Spring Data JPA + PostgreSQL (override via env vars if needed)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:utility_billing}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:gloria_2007}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate: creates/updates tables from @Entity classes on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Run schema.sql after Hibernate creates tables (for triggers/procedures)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
# PostgreSQL functions contain semicolons — use ;; as statement separator
spring.sql.init.separator=;;

# Mail (Gmail SMTP)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:465}
spring.mail.username=${SMTP_USER:gloriantwari@gmail.com}
spring.mail.password=${SMTP_PASS:rvqy bbxn bdui bzrt}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# JWT configuration
app.jwt.secret=${JWT_SECRET:change-me-please-32chars-minimum}
app.jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

app.email.from=${EMAIL_FROM:}

# OTP for staff email verification
app.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:10}
app.seed.admin-email=${ADMIN_EMAIL:admin@wasac.rw}
app.seed.admin-password=${ADMIN_PASSWORD:Admin@12345}

# Swagger — dark mode + hide schema models section
springdoc.swagger-ui.defaultModelsExpandDepth=-1
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.syntaxHighlight.theme=monokai